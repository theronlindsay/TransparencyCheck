services:
  mongodb:
    image: mongo:8.2
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-password123}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username ${MONGO_ROOT_USER:-admin} --password ${MONGO_ROOT_PASSWORD:-password123} --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 })'"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "127.0.0.1:27017:27017" # Bound strictly to localhost to prevent external access
    volumes:
      - mongodb_data:/data/db # Persists your database so data isn't lost on restart

  server:
    build:
      context: .
      dockerfile: docker/server/dockerfile
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy # Wait for MongoDB to be ready before server starts
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password123}@mongodb:27017/transparency_check?authSource=admin
    volumes:
      - pdf-cache:/app/.cache
      - server_logs:/app/logs
    ports:
      - "3000:3000"

  client:
    build:
      context: .
      dockerfile: docker/client/dockerfile
      args:
        VITE_API_BASE_URL: "" # Empty string for nginx proxy - nginx will route /api/ to server:3000
    depends_on:
      - server
    ports:
      - "8080:80"  # Change to 8080:80 for production server
      # - "8443:443"

volumes:
  pdf-cache:
  mongodb_data:
  server_logs:
