services:
  mongodb:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:27017:27017" # Bound strictly to localhost to prevent external access
    volumes:
      - mongodb_data:/data/db # Persists your database so data isn't lost on restart

  server:
    build:
      context: .
      dockerfile: docker/server/dockerfile
    depends_on:
      - mongodb # Ensures the MongoDB container creates and mounts before Node boots
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/transparency_check?authSource=admin
    volumes:
      - pdf-cache:/app/.cache
    ports:
      - "3000:3000"

  client:
    build:
      context: .
      dockerfile: docker/client/dockerfile
      args:
        VITE_API_BASE_URL: "" # Empty string for nginx proxy - nginx will route /api/ to server:3000
    depends_on:
      - server
    ports:
      - "8080:80"  # Change to 8080:80 for production server
      # - "8443:443"

volumes:
  pdf-cache:
  mongodb_data:
