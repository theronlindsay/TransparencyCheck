# .github/workflows/deploy.yml
name: Deploy to VPS
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/TransparencyCheck
            git pull origin master
            # Container-only deploy: build + run via Podman Compose.
            # Root .env is consumed by compose for interpolation and passed into the server container via env_file.
            podman compose --env-file .env down
            podman compose --env-file .env up -d --build
            echo "🚀 Deployment successful! App running at: http://$(curl -s ifconfig.me):8080"