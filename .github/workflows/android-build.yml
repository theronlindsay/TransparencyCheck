name: Android Build & Release

permissions:
  contents: write

on:
  # Trigger manually
  workflow_dispatch:
  # Trigger when a tag starting with 'v' is pushed (e.g. v1.0.0)
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Generate Android Build Target
        run: bunx cap add android
        working-directory: apps/client

      - name: Build Web Assets
        env:
          VITE_API_BASE_URL: https://transparencycheck.app
        run: bun run build:client

      - name: Sync Capacitor
        run: bunx cap sync android
        working-directory: apps/client

      - name: Create Icons
        run: bunx @capacitor/assets generate
        working-directory: apps/client

      - name: Build Android APK (Debug)
        working-directory: apps/client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apps/client/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/client/android/app/build/outputs/apk/debug/app-debug.apk
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
